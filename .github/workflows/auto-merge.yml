name: Auto-merge branches to main

# Throwaway intern repo: any change Claude Code pushes to a branch is merged
# straight into main (no PR/review), so Vercel redeploys the stable URL.
# Vercel keeps the last good deploy live if a change breaks the build.

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            try {
              await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'main',
                head: branch,
                commit_message: `Auto-merge ${branch} into main`,
              });
              console.log(`Merged ${branch} into main`);
            } catch (e) {
              console.log(`Auto-merge skipped (likely a conflict): ${e.message}`);
            }
