# GitLab Pages deploy for the static Next.js export.
# Build runs on every commit to `main`; the `pages` job publishes
# the `public` artifact to the project's unique Pages domain.
image: node:20

stages:
  - build

pages:
  stage: build
  script:
    - npm ci
    - npm run build
    # Next.js export goes to `out/`; GitLab Pages serves from `public/`.
    - rm -rf public
    - mv out public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
